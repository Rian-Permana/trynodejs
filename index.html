<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bitcoin Tracker</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 90%; }
        h1 { font-size: 1.5rem; color: #f59e0b; margin-bottom: 0.5rem; }
        .price { font-size: 3rem; font-weight: bold; margin: 1rem 0; color: #fff; }
        .label { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .status { margin-top: 1.5rem; font-size: 0.8rem; color: #64748b; }
        .btn { background: #f59e0b; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 1rem; transition: 0.3s; }
        .btn:hover { background: #d97706; }
    </style>
</head>
<body>
    <div class="container">
        <span class="label">Current Market Price</span>
        <h1 id="symbol">Bitcoin (BTC)</h1>
        <div class="price" id="btc-price">$0.00</div>
        <button class="btn" onclick="updatePrice()">Refresh Now</button>
        <div class="status" id="last-updated">Updating...</div>
    </div>

    <script>
        async function updatePrice() {
            const priceEl = document.getElementById('btc-price');
            const updateEl = document.getElementById('last-updated');
            
            priceEl.style.opacity = "0.5";
            try {
                const response = await fetch('/api/bitcoin');
                const data = await response.json();
                priceEl.innerText = data.price;
                updateEl.innerText = `Last updated: ${data.updatedAt}`;
            } catch (err) {
                updateEl.innerText = "Error fetching data";
            }
            priceEl.style.opacity = "1";
        }

        // Auto-update every 30 seconds
        updatePrice();
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
