<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Space Dodger</title>
    <style>
        body { margin: 0; background: #0b0e11; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #f0b90b; background: #161a1e; cursor: none; box-shadow: 0 0 20px rgba(240, 185, 11, 0.2); }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        h1 { margin: 0; color: #f0b90b; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>Crypto Space Dodger</h1>
        <p>Use Mouse to Move • Score: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        let gameActive = true;
        const player = { x: 300, y: 350, w: 40, h: 10, color: '#f0b90b' };
        const items = [];

        function createItem() {
            const isCoin = Math.random() > 0.3;
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                type: isCoin ? 'coin' : 'enemy',
                speed: 2 + Math.random() * 3,
                size: isCoin ? 10 : 15
            });
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - player.w/2, player.y, player.w, player.h);

            // Update Items
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                // Draw Items
                ctx.fillStyle = item.type === 'coin' ? '#f0b90b' : '#ff4d4d';
                if (item.type === 'coin') {
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'black';
                    ctx.fillText('₿', item.x - 4, item.y + 4);
                } else {
                    ctx.fillRect(item.x - item.size/2, item.y, 5, item.size * 2); // Candle shape
                }

                // Collision
                if (item.y > player.y && item.y < player.y + player.h &&
                    item.x > player.x - player.w/2 && item.x < player.x + player.w/2) {
                    if (item.type === 'coin') {
                        score += 10;
                        scoreEl.innerText = score;
                        items.splice(i, 1);
                    } else {
                        gameActive = false;
                        alert('Liquidated! Final Score: ' + score);
                        location.reload();
                    }
                }

                if (item.y > canvas.height) items.splice(i, 1);
            }

            if (Math.random() < 0.05) createItem();
            requestAnimationFrame(update);
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
        });

        update();
    </script>
</body>
</html>
